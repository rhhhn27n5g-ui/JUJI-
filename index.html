<!DOCTYPE html>
<html>
<head>
  <title>Click Game</title>

  <style>
    body {
      margin: 0;
      background: black;
      height: 100vh;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #game {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    #scene {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 600px;
    }

    #hitbox {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 120px;
      height: 260px;
      cursor: pointer;
      background: transparent;
    }
  </style>
</head>

<body>

<div id="game">
  <img id="scene" src="idle.png">
  <div id="hitbox"></div>
</div>

<script>
const scene = document.getElementById("scene");
const hitbox = document.getElementById("hitbox");

let clickCount = 0;
let busy = false;

hitbox.onclick = () => {
  if (busy) return;

  clickCount++;

  if (clickCount === 1) {
    playFrames();
  } else {
    playSmoke();
    clickCount = 0;
  }
};


// --------------------
// FRAMES
// --------------------
function playFrames() {
  busy = true;

  let frame = 1;
  const end = 9;

  const loop = setInterval(() => {
    scene.src = `frame${frame}.png`;
    frame++;

    if (frame > end) {
      clearInterval(loop);

      scene.src = "idle.png";
      busy = false;
    }
  }, 100);
}


// --------------------
// SMOKE
// --------------------
function playSmoke() {
  busy = true;

  let frame = 1;
  const end = 55;

  const loop = setInterval(() => {
    scene.src = `smoke${frame}.png`;
    frame++;

    if (frame > end) {
      clearInterval(loop);

      scene.src = "idle.png";
      busy = false;
    }
  }, 80);
}
</script>

</body>
</html>
