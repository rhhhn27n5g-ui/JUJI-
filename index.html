<!DOCTYPE html>
<html>
<head>
  <title>Click Game</title>

  <style>
    body {
      margin: 0;
      background: black;
      height: 100vh;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    #game {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    /* Character */
    #scene {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 600px;
    }

    /* Click area */
    #hitbox {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 120px;
      height: 260px;
      cursor: pointer;
      background: transparent;
    }

    /* TEXT UNDER CHARACTER */
    #text {
      position: absolute;
      bottom: 60px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      color: white;
      font-size: 18px;
      line-height: 1.4;
      pointer-events: none;
    }
  </style>
</head>

<body>

<div id="game">

  <img id="scene" src="idle.png">

  <div id="hitbox"></div>

  <!-- TEXT -->
  <div id="text">
    click me, spida<br>
    click me again twin
  </div>

</div>

<script>
const scene = document.getElementById("scene");
const hitbox = document.getElementById("hitbox");

let state = 0;
let busy = false;

hitbox.onclick = () => {
  if (busy) return;

  state++;

  if (state === 1) {
    playFrames();
  } else if (state === 2) {
    playSmoke();
    state = 0;
  }
};


// --------------------
// FRAMES
// --------------------
function playFrames() {
  busy = true;

  let frame = 1;
  const end = 9;

  const loop = setInterval(() => {
    scene.src = `frame${frame}.png`;
    frame++;

    if (frame > end) {
      clearInterval(loop);
      scene.src = "idle.png";
      busy = false;
    }
  }, 100);
}


// --------------------
// SMOKE
// --------------------
function playSmoke() {
  busy = true;

  let frame = 1;
  const end = 55;

  const loop = setInterval(() => {
    scene.src = `smoke${frame}.png`;
    frame++;

    if (frame > end) {
      clearInterval(loop);
      scene.src = "idle.png";
      busy = false;
    }
  }, 80);
}
</script>

</body>
</html>
