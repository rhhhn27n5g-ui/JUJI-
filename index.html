<!DOCTYPE html>
<html>
<head>
  <title>Click Animation Game</title>

  <style>
    body {
      margin: 0;
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    #scene {
      width: 80vw;
      max-width: 900px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<img id="scene" src="idle.png">

<script>
const scene = document.getElementById("scene");

let state = 0;
let busy = false;

scene.onclick = () => {
  if (busy) return;

  state++;

  if (state === 1) {
    playFrames();
  } else if (state === 2) {
    playSmoke();
    state = 0;
  }
};


// --------------------
// FRAME ANIMATION (frame1 → frame9)
// --------------------
function playFrames() {
  busy = true;

  let frame = 1;
  const end = 9;

  const loop = setInterval(() => {
    scene.src = `frame${frame}.png`;
    frame++;

    if (frame > end) {
      clearInterval(loop);
      scene.src = "idle.png";
      busy = false;
    }
  }, 100);
}


// --------------------
// SMOKE ANIMATION (smoke1 → smoke55)
// --------------------
function playSmoke() {
  busy = true;

  let frame = 1;
  const end = 55;

  const loop = setInterval(() => {
    scene.src = `smoke${frame}.png`;
    frame++;

    if (frame > end) {
      clearInterval(loop);
      scene.src = "idle.png";
      busy = false;
    }
  }, 80);
}
</script>

</body>
</html>
