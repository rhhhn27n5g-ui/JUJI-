<!DOCTYPE html>
<html>
<head>

  <!-- MOBILE FIX -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <title>Click Game</title>

  <style>
    body {
      margin: 0;
      background: white; /* CHANGED HERE */
      height: 100vh;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #game {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    /* CHARACTER */
    #scene {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 70vw;
      max-width: 600px;
    }

    /* HITBOX */
    #hitbox {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 120px;
      height: 260px;
      cursor: pointer;
      background: transparent;
    }

    /* TEXT UNDER CHARACTER */
    #text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, 220px);
      text-align: center;
      color: black; /* changed for white background */
      font-size: 18px;
      line-height: 1.6;
      pointer-events: none;
    }
  </style>
</head>

<body>

<div id="game">

  <img id="scene" src="idle.png">
  <div id="hitbox"></div>

  <!-- TEXT -->
  <div id="text">
    click me, spida<br>
    click me again twin<br>
    thanks
  </div>

</div>

<script>
const scene = document.getElementById("scene");
const hitbox = document.getElementById("hitbox");

let clickCount = 0;
let busy = false;

const cache = {};

function preload(src) {
  if (cache[src]) return;
  const img = new Image();
  img.src = src;
  cache[src] = img;
}

window.onload = () => {
  preload("idle.png");

  for (let i = 1; i <= 9; i++) {
    preload(`frame${i}.png`);
  }

  for (let i = 1; i <= 55; i++) {
    preload(`smoke${i}.png`);
  }
};


hitbox.onclick = () => {
  if (busy) return;

  clickCount++;

  if (clickCount === 1) {
    playFrames();
  } else {
    playSmoke();
    clickCount = 0;
  }
};


// FRAMES
function playFrames() {
  busy = true;

  let frame = 1;
  const end = 9;

  const loop = setInterval(() => {
    scene.src = `frame${frame}.png`;
    frame++;

    if (frame > end) {
      clearInterval(loop);
      scene.src = "idle.png";
      busy = false;
    }
  }, 100);
}


// SMOKE
function playSmoke() {
  busy = true;

  let frame = 1;
  const end = 55;

  const loop = setInterval(() => {
    scene.src = `smoke${frame}.png`;
    frame++;

    if (frame > end) {
      clearInterval(loop);
      scene.src = "idle.png";
      busy = false;
    }
  }, 80);
}
</script>

</body>
</html>
